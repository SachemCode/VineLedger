# Copy relevant sections to Streamlit Community Cloud → App settings → Secrets
# (or to `.streamlit/secrets.toml` locally — never commit real secrets).

[vineledger]
# Set to true when the SQLite file may be wiped on redeploy/sleep (typical for Streamlit Community Cloud).
# Shows a persistent sidebar warning after sign-in so operators run regular database backups.
ephemeral_storage = false
